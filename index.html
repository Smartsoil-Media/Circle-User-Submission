<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radiance South West - Wellbeing Check-In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo {
            width: clamp(180px, 40vw, 260px);
            height: auto;
        }

        .header p {
            color: #7C1A5D;
            font-size: clamp(0.8rem, 2.5vw, 0.95rem);
            margin-top: 5px;
        }

        .chart-container {
            position: relative;
            width: min(90vw, 600px);
            height: min(90vw, 600px);
            margin: 10px auto;
        }

        svg.radar {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 20px rgba(132, 32, 130, 0.1));
        }

        .segment-arc {
            cursor: pointer;
            transition: opacity 0.2s, filter 0.2s;
            stroke: rgba(255,255,255,0.6);
            stroke-width: 1;
        }

        .segment-arc:hover {
            opacity: 0.85;
            filter: brightness(1.1);
        }

        .segment-arc.selected {
            stroke: #fff;
            stroke-width: 3;
            filter: brightness(1.15) drop-shadow(0 0 6px rgba(255,255,255,0.5));
        }

        .category-label {
            font-size: 11px;
            font-weight: 600;
            fill: #842082;
            text-anchor: middle;
            pointer-events: none;
            user-select: none;
            dominant-baseline: central;
        }

        .ring-label {
            font-size: 9px;
            fill: rgba(255,255,255,0.9);
            text-anchor: middle;
            pointer-events: none;
            user-select: none;
            font-weight: 600;
        }

        .result-overlay {
            fill: rgba(132, 32, 130, 0.2);
            stroke: #842082;
            stroke-width: 2.5;
            pointer-events: none;
            transition: d 0.4s ease;
        }

        .result-dot {
            fill: #842082;
            stroke: #fff;
            stroke-width: 2;
            pointer-events: none;
            transition: cx 0.4s ease, cy 0.4s ease;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #7C1A5D;
        }

        .legend-swatch {
            width: 18px;
            height: 12px;
            border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.15);
        }

        .controls {
            text-align: center;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 36px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn-submit {
            background: #842082;
            color: #ffffff;
            text-transform: uppercase;
        }

        .btn-submit:hover {
            transform: scale(1.05);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset {
            background: transparent;
            color: #842082;
            border: 2px solid #842082;
            text-transform: uppercase;
        }

        .btn-reset:hover {
            transform: scale(1.05);
        }

        .progress-text {
            color: #7C1A5D;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .thank-you {
            display: none;
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 0.5s ease;
        }

        .thank-you.show {
            display: block;
        }

        .thank-you h2 {
            color: #842082;
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        .thank-you p {
            color: #7C1A5D;
            font-size: 1rem;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .instructions {
            text-align: center;
            color: #7C1A5D;
            font-size: 0.85rem;
            margin-bottom: 5px;
            font-style: italic;
        }

        .group-select-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 8px 0 4px;
            color: #7C1A5D;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .group-select-wrap select {
            font-family: 'Roboto', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: #842082;
            background: #fff;
            border: 2px solid #842082;
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            outline: none;
        }

        .group-select-wrap select:focus {
            box-shadow: 0 0 0 3px rgba(132, 32, 130, 0.15);
        }


        /* Mobile-friendly adjustments */
        @media (max-width: 480px) {
            body {
                padding: 10px 8px;
            }

            .header {
                margin-bottom: 5px;
            }

            .chart-container {
                width: 95vw;
                height: 95vw;
                margin: 5px auto;
            }

            .instructions {
                font-size: 0.75rem;
                padding: 0 10px;
                margin-bottom: 3px;
            }

            .legend {
                gap: 10px;
                margin: 8px 0;
            }

            .legend-item {
                font-size: 0.7rem;
                gap: 4px;
            }

            .legend-swatch {
                width: 14px;
                height: 10px;
            }

            .btn {
                padding: 10px 28px;
                font-size: 0.9rem;
            }

            .progress-text {
                font-size: 0.8rem;
            }

            .thank-you {
                padding: 30px 15px;
            }

            .thank-you h2 {
                font-size: 1.3rem;
            }

            .thank-you p {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 360px) {
            .chart-container {
                width: 98vw;
                height: 98vw;
            }

            .legend {
                gap: 6px;
            }

            .legend-item {
                font-size: 0.65rem;
            }

            .btn {
                padding: 10px 22px;
                font-size: 0.85rem;
            }
        }

        /* Prevent text selection on touch */
        .chart-container {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="Radiance-Logo.svg" alt="Radiance South West" class="logo">
    </div>

    <div class="group-select-wrap">
        <label for="groupSelect">Group:</label>
        <select id="groupSelect">
            <option value="Busselton">Busselton</option>
            <option value="Margaret River">Margaret River</option>
            <option value="Collie">Collie</option>
            <option value="Bunbury">Bunbury</option>
        </select>
    </div>

    <p class="instructions">Tap each section to rate how you're feeling (outer = great, inner = struggling)</p>

    <div class="chart-container" id="chartContainer">
        <svg class="radar" id="radarSvg" viewBox="-40 -10 680 640"></svg>
    </div>

    <div class="legend" id="legend"></div>

    <div class="controls" id="controls">
        <p class="progress-text" id="progressText">0 of 8 rated</p>
        <button class="btn btn-reset" id="resetBtn">Start Over</button>
        <button class="btn btn-submit" id="submitBtn" disabled>Submit Check-In</button>
    </div>

    <div class="thank-you" id="thankYou">
        <h2>Thank you!</h2>
        <p>Your wellbeing check-in has been recorded.<br>
        Remember, it's okay to not be okay.<br>
        Radiance South West is here for you.</p>
        <button class="btn btn-reset" id="newBtn" style="margin-top: 20px;">New Check-In</button>
    </div>

    <script>
        const categories = [
            { name: 'Mood', icon: '' },
            { name: 'Sleep', icon: '' },
            { name: 'Energy', icon: '' },
            { name: 'Bonding\nwith Baby', icon: '' },
            { name: 'Connection to\nCommunity', icon: '' },
            { name: 'Appetite', icon: '' },
            { name: 'Anxiety\nLevels', icon: '' },
            { name: 'Self\nCare', icon: '' }
        ];

        const levels = 5;
        const levelLabels = ['Struggling', 'Difficult', 'Okay', 'Good', 'Great'];

        // Rainbow: red (inner/bad) -> orange -> yellow -> light green -> green (outer/good)
        const ringColors = [
            '#e74c3c', // 1 - red (struggling)
            '#f39c12', // 2 - orange
            '#f1c40f', // 3 - yellow
            '#82cb55', // 4 - light green
            '#2ecc71', // 5 - green (great)
        ];

        const cx = 300, cy = 300;
        const isMobile = window.innerWidth <= 480;
        const maxRadius = 230;
        const minRadius = 46;
        const labelRadius = isMobile ? maxRadius + 30 : maxRadius + 40;
        const numCategories = categories.length;
        const angleStep = (2 * Math.PI) / numCategories;
        const startOffset = -Math.PI / 2; // start from top

        // State
        const selections = new Array(numCategories).fill(0); // 0 = unselected, 1-5 = level

        const svg = document.getElementById('radarSvg');
        const container = document.getElementById('chartContainer');

        function polarToCartesian(centerX, centerY, radius, angleRad) {
            return {
                x: centerX + radius * Math.cos(angleRad),
                y: centerY + radius * Math.sin(angleRad)
            };
        }

        function describeArc(cx, cy, innerR, outerR, startAngle, endAngle) {
            const gap = 0.015; // small gap between segments
            const sa = startAngle + gap;
            const ea = endAngle - gap;

            const outerStart = polarToCartesian(cx, cy, outerR, sa);
            const outerEnd = polarToCartesian(cx, cy, outerR, ea);
            const innerStart = polarToCartesian(cx, cy, innerR, ea);
            const innerEnd = polarToCartesian(cx, cy, innerR, sa);

            const largeArc = (ea - sa) > Math.PI ? 1 : 0;

            return [
                `M ${outerStart.x} ${outerStart.y}`,
                `A ${outerR} ${outerR} 0 ${largeArc} 1 ${outerEnd.x} ${outerEnd.y}`,
                `L ${innerStart.x} ${innerStart.y}`,
                `A ${innerR} ${innerR} 0 ${largeArc} 0 ${innerEnd.x} ${innerEnd.y}`,
                'Z'
            ].join(' ');
        }

        function buildChart() {
            svg.innerHTML = '';

            // Draw ring segments for each category and level
            for (let catIdx = 0; catIdx < numCategories; catIdx++) {
                const startAngle = startOffset + catIdx * angleStep;
                const endAngle = startAngle + angleStep;

                for (let level = 0; level < levels; level++) {
                    const ringWidth = (maxRadius - minRadius) / levels;
                    const innerR = minRadius + level * ringWidth;
                    const outerR = innerR + ringWidth;

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', describeArc(cx, cy, innerR, outerR, startAngle, endAngle));
                    path.setAttribute('fill', ringColors[level]);
                    path.setAttribute('class', 'segment-arc');
                    path.setAttribute('data-cat', catIdx);
                    path.setAttribute('data-level', level + 1);

                    // Dim unselected rings when a selection exists for this category
                    if (selections[catIdx] > 0 && selections[catIdx] !== level + 1) {
                        path.setAttribute('opacity', '0.35');
                    } else if (selections[catIdx] === level + 1) {
                        path.classList.add('selected');
                    }

                    path.addEventListener('click', (e) => {
                        e.preventDefault();
                        handleClick(catIdx, level + 1);
                    });
                    path.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        handleClick(catIdx, level + 1);
                    }, { passive: false });

                    svg.appendChild(path);
                }
            }

            // Category labels
            for (let catIdx = 0; catIdx < numCategories; catIdx++) {
                const midAngle = startOffset + catIdx * angleStep + angleStep / 2;
                const pos = polarToCartesian(cx, cy, labelRadius, midAngle);

                const lines = categories[catIdx].name.split('\n');
                const labelFontSize = isMobile ? '10' : '11';
                const lineHeight = isMobile ? 12 : 14;
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('class', 'category-label');
                text.setAttribute('font-size', labelFontSize);
                text.setAttribute('x', pos.x);
                text.setAttribute('y', pos.y - (lines.length - 1) * (lineHeight / 2));

                lines.forEach((line, i) => {
                    const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
                    tspan.setAttribute('x', pos.x);
                    tspan.setAttribute('dy', i === 0 ? '0' : String(lineHeight));
                    tspan.textContent = line;
                    text.appendChild(tspan);
                });

                svg.appendChild(text);
            }

            // Ring level labels along first spoke
            for (let level = 0; level < levels; level++) {
                const ringWidth = (maxRadius - minRadius) / levels;
                const r = minRadius + level * ringWidth + ringWidth / 2;
                const angle = startOffset + angleStep / 2;
                const pos = polarToCartesian(cx, cy, r, angle);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('class', 'ring-label');
                text.setAttribute('x', pos.x);
                text.setAttribute('y', pos.y + 3);
                text.textContent = level + 1;
                svg.appendChild(text);
            }

            // Draw result shape if any selections
            drawResultShape();

            // Center circle
            const centerCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            centerCircle.setAttribute('cx', cx);
            centerCircle.setAttribute('cy', cy);
            centerCircle.setAttribute('r', minRadius - 2);
            centerCircle.setAttribute('fill', 'rgba(255,255,255,0.85)');
            centerCircle.setAttribute('stroke', 'rgba(132,32,130,0.2)');
            centerCircle.setAttribute('stroke-width', '1');
            svg.appendChild(centerCircle);

            // Center text
            const centerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            centerText.setAttribute('x', cx);
            centerText.setAttribute('y', cy + 5);
            centerText.setAttribute('text-anchor', 'middle');
            centerText.setAttribute('fill', '#842082');
            centerText.setAttribute('font-size', '13');
            centerText.setAttribute('font-weight', '600');
            centerText.textContent = 'How are you?';
            svg.appendChild(centerText);
        }

        function drawResultShape() {
            const hasSelections = selections.some(s => s > 0);
            if (!hasSelections) return;

            const points = [];
            for (let catIdx = 0; catIdx < numCategories; catIdx++) {
                const midAngle = startOffset + catIdx * angleStep + angleStep / 2;
                const level = selections[catIdx] || 0;
                const ringWidth = (maxRadius - minRadius) / levels;
                const r = level === 0 ? minRadius : minRadius + (level - 0.5) * ringWidth;
                const pos = polarToCartesian(cx, cy, r, midAngle);
                points.push(pos);
            }

            // Polygon
            const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            polygon.setAttribute('points', points.map(p => `${p.x},${p.y}`).join(' '));
            polygon.setAttribute('class', 'result-overlay');
            svg.appendChild(polygon);

            // Dots
            points.forEach((p, i) => {
                if (selections[i] > 0) {
                    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    dot.setAttribute('cx', p.x);
                    dot.setAttribute('cy', p.y);
                    dot.setAttribute('r', 5);
                    dot.setAttribute('class', 'result-dot');
                    svg.appendChild(dot);
                }
            });
        }

        function handleClick(catIdx, level) {
            // Toggle off if clicking the same level
            if (selections[catIdx] === level) {
                selections[catIdx] = 0;
            } else {
                selections[catIdx] = level;
            }
            buildChart();
            updateProgress();
        }

        function updateProgress() {
            const filled = selections.filter(s => s > 0).length;
            document.getElementById('progressText').textContent = `${filled} of ${numCategories} rated`;
            document.getElementById('submitBtn').disabled = filled < numCategories;
        }

        function reset() {
            selections.fill(0);
            buildChart();
            updateProgress();
            document.getElementById('controls').style.display = '';
            document.getElementById('chartContainer').style.display = '';
            document.getElementById('thankYou').classList.remove('show');
            document.querySelector('.instructions').style.display = '';
            document.querySelector('.legend').style.display = '';
            document.querySelector('.group-select-wrap').style.display = '';
        }

        // Paste the Google Apps Script Web App URL here after deploying.
        const SUBMIT_URL = 'https://script.google.com/macros/s/AKfycbxolag9ryTW_3jlglUpg2Q-o8dur3xFNMQCt0JqztIieUZknHLIlmuUrIsCSj7-R8uDRw/exec';

        document.getElementById('submitBtn').addEventListener('click', () => {
            // Collect results
            const results = {};
            categories.forEach((cat, i) => {
                results[cat.name.replace('\n', ' ')] = {
                    score: selections[i],
                    label: levelLabels[selections[i] - 1]
                };
            });

            const payload = {
                timestamp: new Date().toISOString(),
                group: document.getElementById('groupSelect').value,
                results: results
            };

            console.log('Wellbeing Check-In Results:', payload);

            // Send to Google Sheet via Apps Script.
            // Using text/plain + no-cors avoids a CORS preflight — Apps Script
            // still receives the JSON body via e.postData.contents.
            if (SUBMIT_URL && !SUBMIT_URL.startsWith('PASTE_')) {
                fetch(SUBMIT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                }).catch(err => console.error('Submit failed:', err));
            }

            // Show thank you
            document.getElementById('controls').style.display = 'none';
            document.querySelector('.instructions').style.display = 'none';
            document.querySelector('.legend').style.display = 'none';
            document.querySelector('.group-select-wrap').style.display = 'none';
            document.getElementById('thankYou').classList.add('show');
        });

        document.getElementById('resetBtn').addEventListener('click', reset);
        document.getElementById('newBtn').addEventListener('click', reset);

        // Build legend
        const legend = document.getElementById('legend');
        ringColors.forEach((color, i) => {
            const item = document.createElement('div');
            item.className = 'legend-item';
            item.innerHTML = `<div class="legend-swatch" style="background:${color}"></div>${levelLabels[i]}`;
            legend.appendChild(item);
        });

        // Initial build
        buildChart();
        updateProgress();
    </script>
</body>
</html>
